name: validate config example
on:
  pull_request:
    paths:
      - .github/workflows/unit-test-config-example.yml
      - .github/actions/cue/action.yml
      - config-example.yml
      - config.cue

jobs:
  cue:
    runs-on: ubuntu-24.04
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/cue
        with:
          data-file: config-example.yml
