name: renovate
on:
  schedule:
    - cron: '10 1 * * *'
  workflow_dispatch:
    inputs:
      base_branch_patterns:
        description: run on
        type: choice
        required: false
        default: the selected branch
        options:
          - the selected branch
          - main
      dry_run:
        type: boolean
        required: false
        default: true

jobs:
  renovate:
    if: github.repository_visibility == 'private'
    runs-on: ubuntu-24.04
    timeout-minutes: 4

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: renovatebot/github-action@6a9df9227eeb83af9a5abef6890bbb0c9068f436 # v46.1.11
        env:
          LOG_LEVEL: debug
          RENOVATE_PRINT_CONFIG: true
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_BASE_BRANCH_PATTERNS: ${{ github.event.inputs.base_branch_patterns == 'main' && 'main' || github.ref_name }}
          RENOVATE_DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && 'full' || null }}
          # renovate: datasource=docker depName=ghcr.io/renovatebot/renovate
          RENOVATE_VERSION: 43.141.5
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
          configurationFile: .github/renovate-global.json
          renovate-version: ${{ env.RENOVATE_VERSION }}
