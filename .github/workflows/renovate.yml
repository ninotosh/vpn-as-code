name: renovate
on:
  schedule:
    - cron: '10 3 * * *'
  workflow_dispatch:
    inputs:
      base_branch_patterns:
        description: run on
        type: choice
        required: false
        default: the selected branch
        options:
          - the selected branch
          - main
      dry_run:
        type: boolean
        required: false
        default: true

jobs:
  renovate:
    if: ${{ !github.event.repository.is_template }}
    runs-on: ubuntu-24.04
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v6

      - uses: renovatebot/github-action@b67590ea780158ccd13192c22a3655a5231f869d # v46.1.8
        env:
          LOG_LEVEL: debug
          RENOVATE_PRINT_CONFIG: true
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_BASE_BRANCH_PATTERNS: ${{ github.event.inputs.base_branch_patterns == 'main' && 'main' || github.ref_name }}
          RENOVATE_DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && 'full' || null }}
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
          configurationFile: .github/renovate-global.json
          # renovate-version: ${{ env.RENOVATE_VERSION }}
