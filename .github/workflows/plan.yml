name: show a plan
on:
  pull_request:
    paths:
      - config.yml

jobs:
  cue:
    runs-on: ubuntu-24.04
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: validate config
        uses: ./.github/actions/cue
        with:
          data-file: config.yml

  plan:
    needs: cue
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: set up terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        env:
          # renovate: datasource=github-releases depName=hashicorp/terraform
          TERRAFORM_VERSION: '1.15.3'
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          cli_config_credentials_token: ${{ secrets.HCP_TERRAFORM_TEAM_TOKEN }}
          terraform_wrapper: false # for `make`

      - run: make

      - name: terraform plan
        run: |
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform plan -no-color | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
