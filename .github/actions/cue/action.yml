name: cue
description: check format and validate
inputs:
  data-file:
    required: true
  schema-file:
    required: true
  cue-version:
    default: 0.16.0

runs:
  using: "composite"
  steps:
    - uses: actions/cache@v5
      id: cache
      with:
        path: ~/bin/cue
        key: cue-${{ inputs.cue-version }}

    - if: steps.cache.outputs.cache-hit != 'true'
      run: |
        mkdir -p ~/bin
        curl -L -o cue.tar.gz https://github.com/cue-lang/cue/releases/download/v${{ inputs.cue-version }}/cue_v${{ inputs.cue-version }}_linux_amd64.tar.gz
        tar zxf cue.tar.gz
        cp cue ~/bin/cue
      shell: bash

    - run: echo "PATH=~/bin:$PATH" >> $GITHUB_ENV
      shell: bash

    - run: cue fmt --check ${{ inputs.schema-file }}
      shell: bash

    - run: cue vet --concrete ${{ inputs.schema-file }} ${{ inputs.data-file }}
      shell: bash
