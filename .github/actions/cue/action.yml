name: cue
description: check format and validate
inputs:
  data-file:
    required: true
  schema-file:
    default: config.cue
    required: false

runs:
  using: "composite"
  steps:
    - run: echo CUE_VERSION=${CUE_VERSION} >> $GITHUB_ENV
      env:
        # renovate: datasource=github-releases depName=cue-lang/cue
        CUE_VERSION: 0.16.1
      shell: bash

    - uses: actions/cache@v5
      id: cache
      with:
        path: ~/bin/cue
        key: cue-${{ env.CUE_VERSION }}

    - if: steps.cache.outputs.cache-hit != 'true'
      run: |
        mkdir -p ~/bin
        ARCH="$(uname -m | sed 's/aarch64/arm64/; s/x86_64/amd64/')"
        curl -L -o cue.tar.gz https://github.com/cue-lang/cue/releases/download/v${CUE_VERSION}/cue_v${CUE_VERSION}_linux_${ARCH}.tar.gz
        tar zxf cue.tar.gz
        cp cue ~/bin/cue
      shell: bash

    - run: echo "PATH=~/bin:$PATH" >> $GITHUB_ENV
      shell: bash

    - run: cue fmt --check ${{ inputs.schema-file }}
      shell: bash

    - run: cue vet --concrete ${{ inputs.schema-file }} ${{ inputs.data-file }}
      shell: bash
