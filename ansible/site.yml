- name: all
  hosts: all
  gather_facts: false
  tasks:
    - name: wait for connection
      ansible.builtin.wait_for_connection:
        timeout: 240
    - name: import openvpn role
      when: '"openvpn" in applications'
      become: true
      ansible.builtin.import_role:
        name: openvpn
    - name: import wireguard role
      when: '"wireguard" in applications'
      become: true
      ansible.builtin.import_role:
        name: wireguard
