- name: Save the server conf
  ansible.builtin.template:
    src: server.conf.j2
    dest: "{{ wireguard_dir }}/wg0.conf"
    mode: u=rw,g=,o=

- name: Save the client files
  loop: "{{ clients }}"
  vars:
    client: "{{ wireguard_peers[item] }}"
  ansible.builtin.template:
    src: client.conf.j2
    dest: "{{ wireguard_dir }}/{{ item }}.conf"
    mode: u=rw,g=,o=
