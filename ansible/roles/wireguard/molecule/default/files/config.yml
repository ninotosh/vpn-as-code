terraform_cloud:
  organization:
    name: my_organization_2558
    workspace: my_workspace
google_cloud:
  project_id: my-project-147248
servers:
  instance0:
    provider: aws
    aws:
      region: us-west-2
      compute: lightsail
      lightsail:
        availability_zone: b
        blueprint_id: ubuntu_24_04 # renovate
        bundle_id: nano_ipv6_3_0
    applications:
      - wireguard
    clients:
      - client0
      - client1
  instance1:
    provider: gc
    gc:
      compute: gce
      gce:
        region: us-west1
        zone: b
        machine_type: e2-micro
        image:
          project: ubuntu-os-cloud
          family: ubuntu-2404-lts-amd64 # renovate
        enable_ipv6: false
    applications:
      - wireguard
    clients:
      - client1
