---
- name: Create
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Create test containers
      loop: "{{ groups['ungrouped'] }}"
      loop_control:
        loop_var: _container_name
        index_var: _container_index
      vars:
        _external_port: "{{ 5300 + _container_index }}"
      community.docker.docker_container:
        name: "{{ _container_name }}"
        image: ubuntu:24.04 # renovate
        capabilities:
          - NET_ADMIN
        command: sleep inf
        default_host_ip: ''
        state: started
        published_ports:
          - "{{ _external_port }}:53/udp" # 0.0.0.0 and [::]
        sysctls: # enable these parameters to be modified in the container
          net.ipv6.conf.all.disable_ipv6: 0
          net.ipv6.conf.all.forwarding: 1
