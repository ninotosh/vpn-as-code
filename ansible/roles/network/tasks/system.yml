- name: Enable ipv4 forwarding for all interfaces
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    sysctl_set: true
    state: present
    reload: true
- name: Enable ipv4 forwarding for new interfaces
  ansible.posix.sysctl:
    name: net.ipv4.conf.default.forwarding
    value: '1'
    sysctl_set: true
    state: present
    reload: true

- name: Enable ipv6 for all interfaces
  ansible.posix.sysctl:
    name: net.ipv6.conf.all.disable_ipv6
    value: '0'
    sysctl_set: true
    state: present
    reload: true
- name: Enable ipv6 for new interfaces
  ansible.posix.sysctl:
    name: net.ipv6.conf.default.disable_ipv6
    value: '0'
    sysctl_set: true
    state: present
    reload: true

- name: Enable ipv6 forwarding for all interfaces
  ansible.posix.sysctl:
    name: net.ipv6.conf.all.forwarding
    value: '1'
    sysctl_set: true
    state: present
    reload: true
- name: Enable ipv6 forwarding for new interfaces
  ansible.posix.sysctl:
    name: net.ipv6.conf.default.forwarding
    value: '1'
    sysctl_set: true
    state: present
    reload: true
